ï»¿<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>幸���大抽奖</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden}
.container{text-align:center;padding:20px}
h1{color:#fff;font-size:2.5em;margin-bottom:30px;text-shadow:0 2px 10px rgba(0,0,0,.3)}
.machine{background:rgba(255,255,255,.15);backdrop-filter:blur(10px);border-radius:20px;padding:30px;display:inline-block;box-shadow:0 8px 32px rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.2)}
.reels{display:flex;gap:15px;justify-content:center;margin:20px 0}
.reel{width:100px;height:120px;background:#fff;border-radius:10px;overflow:hidden;position:relative;box-shadow:0 4px 15px rgba(0,0,0,.3)}
.reel-inner{position:absolute;width:100%;transition:top 3s cubic-bezier(0.2,0.8,0.3,1)}
.reel-item{width:100%;height:120px;display:flex;align-items:center;justify-content:center;padding:5px}
.reel-item img{width:90px;height:90px;object-fit:contain;border-radius:8px}
.lever{width:80px;height:80px;background:linear-gradient(145deg,#ffd700,#ff8c00);border-radius:50%;border:4px solid #fff;cursor:pointer;margin:20px auto 0;font-size:1.1em;color:#fff;font-weight:bold;transition:transform .1s;box-shadow:0 4px 15px rgba(0,0,0,.3);display:block}
.lever:active{transform:scale(.95)}
.lever:disabled{opacity:.6;cursor:not-allowed}
.status{color:#fff;margin-top:15px;font-size:1.1em;min-height:1.5em}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:none;justify-content:center;align-items:center;z-index:100}
.modal.show{display:flex}
.modal-content{background:#fff;border-radius:20px;padding:40px;max-width:400px;width:90%;text-align:center;animation:popIn .3s ease}
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.prize-img{max-width:200px;max-height:200px;border-radius:12px;margin:15px 0;object-fit:contain}
.btn{display:inline-block;padding:12px 30px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:25px;font-size:1em;cursor:pointer;margin:10px 5px;transition:transform .2s,box-shadow .2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.5)}
.btn2{background:linear-gradient(135deg,#11998e,#38ef7d)}
.qr-img{max-width:220px;border-radius:12px;border:3px solid #667eea;margin-top:15px}
.tip{color:#666;font-size:.9em;margin-top:10px}
@keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(-200px) rotate(720deg);opacity:0}}
.confetti{position:fixed;width:10px;height:10px;animation:confetti 1.5s ease-out forwards;pointer-events:none;z-index:200}
</style>
</head>
<body>
<div class="container">
<h1>幸���大抽奖</h1>
<div class="machine">
<div class="reels">
<div class="reel"><div class="reel-inner" id="inner1"></div></div>
<div class="reel"><div class="reel-inner" id="inner2"></div></div>
<div class="reel"><div class="reel-inner" id="inner3"></div></div>
</div>
<button class="lever" id="lever" onclick="startDraw()">抽奖</button>
<div class="status" id="status"></div>
</div>
</div>
<div class="modal" id="modal1">
<div class="modal-content">
<h2 id="prizeName"></h2>
<img class="prize-img" id="prizeImg" src="">
<button class="btn" onclick="showTeacher()">下一步���添加实挍老师</button>
</div>
</div>
<div class="modal" id="modal2">
<div class="modal-content">
<h2>扫码添加实挍老师</h2>
<p style="color:#666;margin:10px 0">凭中奖截截取取</p>
<img class="qr-img" src="qrcode.jpg" alt="QR">
<p class="tip">长扽保存二码，扫码添加</p>
<button class="btn btn2" onclick="closeAll()">关闭</button>
</div>
</div>
<script>
var BASE="https://740879648-png.github.io/lottery/";
var PRIZES=[
  {name:"AI工具卅",prob:1,img:"prizes/ai-tool.jpg"},
  {name:"卍单",prob:0,img:"prizes/free-order.jpg"},
  {name:"小米手机",prob:0,img:"prizes/xiaomi-phone.jpg"},
  {name:"蒸汽锅",prob:0,img:"prizes/steam-pot.jpg"}
];
var STORAGE_KEY="lottery_v1_";
var ITEM_H=120;
var ITEMS=8;
function init(){
  if(localStorage.getItem(STORAGE_KEY+"drawn")){
    document.getElementById("status").textContent="已抽过奖，等待下次开弋";
    document.getElementById("lever").disabled=true;
  }
  fillReels();
}
function fillReels(){
  for(var r=1;r<=3;r++){
    var el=document.getElementById("inner"+r);
    var html="";
    for(var i=0;i<ITEMS;i++){
      var p=PRIZES[i%PRIZES.length];
      html+='<div class="reel-item"><img src="'+BASE+p.img+'" alt="'+p.name+'"></div>';
    }
    el.innerHTML=html;
    el.style.top="0px";
  }
}
function selectPrize(){
  var total=PRIZES.reduce(function(s,p){return s+(p.prob||0);},0);
  if(total<=0)return PRIZES[0];
  var r=Math.random()*total;
  for(var i=0;i<PRIZES.length;i++){r-=PRIZES[i].prob||0;if(r<=0)return PRIZES[i];}
  return PRIZES[0];
}
function spinReel(n,prize,cb){
  var el=document.getElementById("inner"+n);
  var prizeIdx=0;
  for(var i=0;i<PRIZES.length;i++){if(PRIZES[i].name===prize.name){prizeIdx=i;break;}}
  var maxTop=(ITEMS-1)*ITEM_H;
  var targetTop=-(((ITEMS*3+prizeIdx)*ITEM_H)%maxTop||maxTop);
  el.style.transition="none";
  el.style.top="0px";
  el.offsetHeight;
  el.style.transition="top 3s cubic-bezier(0.2,0.8,0.3,1)";
  el.style.top=targetTop+"px";
  setTimeout(function(){
    el.style.transition="none";
    el.style.top=(-prizeIdx*ITEM_H)+"px";
    setTimeout(cb,100);
  },3100);
}
function startDraw(){
  if(localStorage.getItem(STORAGE_KEY+"drawn")){
    document.getElementById("status").textContent="您已过抽了奖";
    return;
  }
  var btn=document.getElementById("lever");
  btn.disabled=true;
  btn.textContent="抽奖中...";
  var prize=selectPrize();
  spinReel(1,prize,function(){
    spinReel(2,prize,function(){
      spinReel(3,prize,function(){
        localStorage.setItem(STORAGE_KEY+"drawn","true");
        showPrize(prize);
      });
    });
  });
}
function showPrize(p){
  document.getElementById("prizeName").textContent=p.name;
  document.getElementById("prizeImg").src=BASE+p.img;
  document.getElementById("modal1").classList.add("show");
  launchConfetti();
}
function showTeacher(){
  document.getElementById("modal1").classList.remove("show");
  document.getElementById("modal2").classList.add("show");
}
function closeAll(){
  document.getElementById("modal2").classList.remove("show");
}
function launchConfetti(){
  var colors=["#ff6b6b","#ffd93d","#6bcb77","#4d96ff","#ff9ff3","#feca57"];
  for(var i=0;i<50;i++){
    var c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.top=Math.random()*50+50+"vh";
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.borderRadius=Math.random()>.5?"50%":"0";
    c.style.animationDelay=Math.random()+"s";
    document.body.appendChild(c);
    setTimeout(function(){c.remove();},3000);
  }
}
init();
</script>
</body>
</html>
