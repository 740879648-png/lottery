<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>幸运大抽奖</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden}
.container{text-align:center;padding:20px}
h1{color:#fff;font-size:2.5em;margin-bottom:30px;text-shadow:0 2px 10px rgba(0,0,0,.3)}
.machine{background:rgba(255,255,255,.15);backdrop-filter:blur(10px);border-radius:20px;padding:30px;display:inline-block;box-shadow:0 8px 32px rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.2)}
.reels{display:flex;gap:15px;justify-content:center;margin:20px 0}
.reel{width:100px;height:120px;background:#fff;border-radius:10px;overflow:hidden;position:relative;box-shadow:0 4px 15px rgba(0,0,0,.3)}
.reel-inner{position:absolute;width:100%;transition:top 3s cubic-bezier(0.2,0.8,0.3,1)}
.reel-item{width:100%;height:120px;display:flex;align-items:center;justify-content:center;padding:5px}
.reel-item img{width:90px;height:90px;object-fit:contain;border-radius:8px}
.lever{width:80px;height:80px;background:linear-gradient(145deg,#ffd700,#ff8c00);border-radius:50%;border:4px solid #fff;cursor:pointer;margin:20px auto 0;font-size:1.1em;color:#fff;font-weight:bold;transition:transform .1s;box-shadow:0 4px 15px rgba(0,0,0,.3);display:block}
.lever:active{transform:scale(.95)}
.lever:disabled{opacity:.6;cursor:not-allowed}
.status{color:#fff;margin-top:15px;font-size:1.1em;min-height:1.5em}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:none;justify-content:center;align-items:center;z-index:100}
.modal.show{display:flex}
.modal-content{background:#fff;border-radius:20px;padding:40px;max-width:400px;width:90%;text-align:center;animation:popIn .3s ease}
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.prize-img{max-width:200px;max-height:200px;border-radius:12px;margin:15px 0;object-fit:contain}
.btn{display:inline-block;padding:12px 30px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;text-decoration:none;border-radius:25px;margin:5px;font-weight:500;transition:transform .2s;cursor:pointer;border:none;font-size:1em}
.btn:hover{transform:translateY(-2px)}
.btn-secondary{background:#f0f0f0;color:#333}
.confetti{position:fixed;width:10px;height:10px;background:#f00;animation:fall 3s linear forwards;z-index:99}
@keyframes fall{to{transform:translateY(100vh) rotate(720deg);opacity:0}}
.qrcode{max-width:180px;border-radius:10px;margin:10px 0}
</style>
</head>
<body>
<div class="container">
<h1>🎰 幸运大抽奖</h1>
<div class="machine">
<div class="reels">
<div class="reel"><div class="reel-inner" id="reel1"></div></div>
<div class="reel"><div class="reel-inner" id="reel2"></div></div>
<div class="reel"><div class="reel-inner" id="reel3"></div></div>
</div>
<button class="lever" id="spinBtn" onclick="spin()">开始</button>
<div class="status" id="status"></div>
</div>
</div>
<div class="modal" id="resultModal">
<div class="modal-content">
<h2 id="resultTitle">🎉 恭喜你！</h2>
<img class="prize-img" id="prizeImg" src="" alt="奖品">
<p id="prizeName"></p>
<img class="qrcode" src="qrcode.jpg" alt="扫码领奖">
<p style="color:#666;font-size:.9em">截图保存，扫码联系客服领奖</p>
<button class="btn" onclick="closeModal()">确定</button>
</div>
</div>
<script>
const PRIZES=[{"id":1,"name":"AI工具包","prob":1,"image":"prizes/ai-tool.jpg"},{"id":2,"name":"免单","prob":0,"image":"prizes/free-order.jpg"},{"id":3,"name":"小米手机","prob":0,"image":"prizes/xiaomi-phone.jpg"},{"id":4,"name":"蒸汽锅","prob":0,"image":"prizes/steam-pot.jpg"}];
let spinning=false,hasSpun=false;
function initReels(){const items=PRIZES.map(p=>'<div class="reel-item"><img src="'+p.image+'" alt="'+p.name+'"></div>').join('');['reel1','reel2','reel3'].forEach(id=>document.getElementById(id).innerHTML=items.repeat(3))}
function spin(){if(spinning)return;spinning=true;document.getElementById('spinBtn').disabled=true;document.getElementById('status').textContent='抽奖中...';const winner=selectWinner();animateReels(winner.id-1)}
function selectWinner(){const r=Math.random();let cum=0;for(const p of PRIZES){cum+=p.prob/100;if(r<=cum)return p}return PRIZES[0]}
function animateReels(winnerIdx){const reels=['reel1','reel2','reel3'],stops=[winnerIdx,winnerIdx,winnerIdx];reels.forEach((id,i)=>{const reel=document.getElementById(id),itemH=120,totalItems=PRIZES.length*3,spins=5+Math.floor(Math.random()*3),finalPos=(spins*totalItems+stops[i])*itemH+60;reel.style.transition='top 3s cubic-bezier(0.2,0.8,0.3,1)';reel.style.top='-'+finalPos+'px'});setTimeout(()=>showResult(PRIZES[winnerIdx]),3200)}
function showResult(prize){document.getElementById('resultTitle').textContent='🎉 恭喜你抽中';document.getElementById('prizeImg').src=prize.image;document.getElementById('prizeName').textContent=prize.name;document.getElementById('resultModal').classList.add('show');createConfetti();spinning=false;hasSpun=true;document.getElementById('spinBtn').disabled=false;document.getElementById('status').textContent=''}
function closeModal(){document.getElementById('resultModal').classList.remove('show')}
function createConfetti(){for(let i=0;i<50;i++){const c=document.createElement('div');c.className='confetti';c.style.left=Math.random()*100+'vw';c.style.background='hsl('+Math.random()*360+',100%,50%)';c.style.animationDuration=(Math.random()*2+2)+'s';document.body.appendChild(c);setTimeout(()=>c.remove(),4000)}}
initReels();
</script>
</body>
</html>
